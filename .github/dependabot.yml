version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      dev-tooling:
        patterns:
          - "eslint*"
          - "@eslint*"
          - "jest*"
          - "@jest*"
          - "ts-jest"
          - "@types/*"
          - "typescript"
          - "identity-obj-proxy"
          - "ts-node"
      testing:
        patterns:
          - "@testing-library/*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
